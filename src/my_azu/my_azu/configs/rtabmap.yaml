rgbd_odometry:
  ros__parameters:
    # Odom từ RGB-D + IMU của D435i (hiện KHÔNG dùng cho RTAB-Map chính,
    # nhưng vẫn giữ lại để dễ thử nghiệm nếu cần).
    frame_id: "base_link"
    odom_frame_id: "odom"
    publish_tf: true

    # Để an toàn cho map 2D, ép về 3 bậc tự do (x, y, yaw)
    Reg/Force3DoF: "true"
    subscribe_imu: true

    Vis/FeatureType: "6"           # ORB
    Vis/MaxFeatures: "1500"
    Vis/MinInliers: "8"
    FAST/Threshold: "5"
    GFTT/QualityLevel: "0.001"
    Odom/MinInliers: "8"
    Odom/ResetCountdown: "1"

    # Đồng bộ RGB + Depth (+ IMU)
    approx_sync: true
    approx_sync_max_interval: 0.15   # nới rộng cửa sổ cho 15 FPS
    topic_queue_size: 30  
    sync_queue_size: 100
    wait_for_transform: 0.5

icp_odometry:
  ros__parameters:
    # Odom chính dựa trên LiDAR (scan matching), đúng tinh thần
    # "Lidar chính xác, odom sai" trong slide bạn gửi.
    frame_id: "base_link"          # pose của robot
    odom_frame_id: "odom"
    publish_tf: true

    # Dùng dữ liệu từ scan 2D
    subscribe_scan: true

    # Làm việc trong 2D (x, y, yaw) cho map 2D ổn định
    Reg/Force3DoF: "true"

    # Tham số ICP/odometry cơ bản (có thể tinh chỉnh thêm nếu cần)
    Odom/ResetCountdown: "1"
    Odom/Strategy: "0"        # 0=ICP, 1=GICP, 2=ICP-PointToPlane (tùy phiên bản)
    Icp/VoxelSize: "0.05"
    Icp/MaxCorrespondenceDistance: "0.5"
    Icp/Iterations: "30"

rtabmap:
  ros__parameters:
    # Khung TF
    frame_id: "base_link"
    odom_frame_id: "odom"
    map_frame_id: "map"

    subscribe_depth: true
    subscribe_scan: true        

    # Map 2D từ LiDAR (gọn cho Nav2)
    Grid/FromDepth: "false"          # 2D grid lấy từ scan laser, không chiếu depth xuống
    Grid/CellSize: "0.03"            # cell nhỏ hơn → tường mịn hơn
    Grid/RangeMax: "6.0"             # giới hạn tầm vẽ map (m)
    Grid/MaxObstacleHeight: "1.2"    # chỉ lấy điểm thấp (tường / vật cản thấp), bớt xuyên tường do camera cao

    # Bật map 3D + Cloud 3D để bạn xem song song với 2D
    Grid/3D: "true"

    # Cloud 3D (dùng cho MapCloud/PointCloud)
    Cloud/OutputVoxelized: "true"
    Cloud/OutputVoxelSize: "0.02"    # voxel nhỏ hơn cho 3D map mượt
    Cloud/MinDepth: "0.25"
    Cloud/MaxDepth: "5.0"
    Cloud/NoiseFiltering: "true"     # lọc nhiễu lẻ loi
    Cloud/NoiseRadius: "0.10"        # bán kính lân cận (m)
    Cloud/NoiseMinNeighbors: "3"     # tối thiểu 3 láng giềng để giữ điểm

    # Đồng bộ RGB-D cho SLAM
    approx_sync: true
    approx_sync_max_interval: 0.15
    topic_queue_size: 30
    sync_queue_size: 100
    wait_for_transform: 0.5

    # DB lưu map
    database_path: "~/ros2_ws/maps/my_home.db"
    database_in_memory: true
    delete_db_on_start: true  # Không xóa map cũ
    save_db_on_shutdown: false # Tự động lưu khi tắt
